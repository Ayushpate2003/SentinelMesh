services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "${REDIS_MAX_MEMORY:-256mb}", "--maxmemory-policy", "allkeys-lru"]
    profiles: ["dev", "dev-min", "full"]
    mem_limit: 256m
    cpus: 0.50
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - LIGHT_MODE=false
      - SIMULATION_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - ALERTMANAGER_URL=http://alertmanager:9093
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # macOS optimization: cache host writes and avoid broad repo mounts
      - ./backend:/app/backend:cached
      - ./attacker_sim:/app/attacker_sim:cached
      - ./sentinelmesh.db:/app/sentinelmesh.db
    profiles: ["dev", "dev-min", "full"]
    mem_limit: 768m
    cpus: 1.00
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/v1/system/health', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 6
      start_period: 15s

  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    env_file:
      - .env
    environment:
      - LIGHT_MODE=false
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./core:/app/core:cached
      - ./sentinelmesh.db:/app/sentinelmesh.db
    profiles: ["dev"]
    mem_limit: 512m
    cpus: 0.75
    restart: unless-stopped
    stop_grace_period: 20s

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "backend.worker"]
    env_file:
      - .env
    environment:
      - LIGHT_MODE=false
      - REDIS_URL=redis://redis:6379/0
      - WORKER_METRICS_PORT=9101
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["dev"]
    mem_limit: 512m
    cpus: 1.00
    restart: unless-stopped
    stop_grace_period: 30s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    command: ["npm", "run", "dev"]
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8002
      - CHOKIDAR_USEPOLLING=false
      - WATCHPACK_POLLING=false
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./dashboard:/app:cached
      - dashboard_node_modules:/app/node_modules
    profiles: ["dev"]
    mem_limit: 1536m
    cpus: 1.50
    restart: unless-stopped

  backend-full:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8002", "--workers", "2"]
    env_file:
      - .env
    environment:
      - LIGHT_MODE=true
      - SIMULATION_ENABLED=false
      - REDIS_URL=redis://redis:6379/0
      - ALERTMANAGER_URL=http://alertmanager:9093
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["full"]
    mem_limit: 1024m
    cpus: 1.50
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/v1/system/health', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 6
      start_period: 20s

  core-full:
    build:
      context: .
      dockerfile: core/Dockerfile
    env_file:
      - .env
    environment:
      - LIGHT_MODE=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    profiles: ["full"]
    mem_limit: 512m
    cpus: 0.75
    restart: unless-stopped
    stop_grace_period: 20s

  worker-full:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "backend.worker"]
    env_file:
      - .env
    environment:
      - LIGHT_MODE=true
      - REDIS_URL=redis://redis:6379/0
      - WORKER_METRICS_PORT=9101
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["full"]
    mem_limit: 512m
    cpus: 1.00
    restart: unless-stopped
    stop_grace_period: 30s

  dashboard-full:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    command: ["sh", "-c", "npm run build && npm run start"]
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8002
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      backend:
        condition: service_healthy
    profiles: ["full"]
    mem_limit: 1024m
    cpus: 1.00
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      backend:
        condition: service_healthy
      alertmanager:
        condition: service_started
    profiles: ["full"]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    command:
      - "--config.file=/etc/alertmanager/config.yml"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/config.yml:ro
    ports:
      - "9093:9093"
    profiles: ["full"]
    restart: unless-stopped

  alertmanager-telegram:
    image: metalmatze/alertmanager-bot:latest
    command:
      - "--store=bolt"
      - "--telegram.token=${TELEGRAM_BOT_TOKEN}"
      - "--telegram.admin=${TELEGRAM_CHAT_ID}"
      - "--alertmanager.url=http://alertmanager:9093"
      - "--log.level=info"
    env_file:
      - .env
    depends_on:
      - alertmanager
    profiles: ["full"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - alertmanager
    profiles: ["full"]
    restart: unless-stopped

volumes:
  dashboard_node_modules:
