services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app/backend
      - ./sentinelmesh.db:/app/sentinelmesh.db

  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
      - backend
    volumes:
      - ./core:/app/core
      - ./sentinelmesh.db:/app/sentinelmesh.db

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8002
    depends_on:
      - backend

volumes:
  sqlite_data:
